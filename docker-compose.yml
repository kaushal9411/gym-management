# ════════════════════════════════════════════════════════════════════════
# gym-saas-platform — DEVELOPMENT environment
# Backing services only; apps run on the host via `pnpm dev` for fast HMR.
# Optional subdomain proxy: `docker compose --profile proxy up` (requires
# *.fitcloud.local pointed at 127.0.0.1 in your hosts file / dnsmasq).
# Production compose lives in infrastructure/docker/docker-compose.prod.yml.
# ════════════════════════════════════════════════════════════════════════

name: gym-saas-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: gym-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: gym
      POSTGRES_DB: gym_saas
    ports:
      # Host port 5433 — this machine already has a native PostgreSQL
      # service bound to 5432; mapping elsewhere avoids the conflict
      # without touching that unrelated installation.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym -d gym_saas"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gym-saas-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: gym-saas-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  nginx:
    image: nginx:1.27-alpine
    container_name: gym-saas-nginx
    profiles: ["proxy"]
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
  redis-data:
