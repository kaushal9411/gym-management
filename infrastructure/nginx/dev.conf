# ══════════════════════════════════════════════════════════════════════
# DEV reverse proxy — exercises the subdomain-as-tenant architecture
# locally. Requires hosts entries pointing at 127.0.0.1:
#   fitcloud.local  admin.fitcloud.local  api.fitcloud.local
#   goldgym.fitcloud.local  (any test tenant slugs you use)
# Apps run on the host (pnpm dev); nginx runs in compose (profile: proxy).
# ══════════════════════════════════════════════════════════════════════

# Landing website — fitcloud.local
server {
    listen 80;
    server_name fitcloud.local www.fitcloud.local;
    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Super admin portal — admin.fitcloud.local
server {
    listen 80;
    server_name admin.fitcloud.local;
    location / {
        proxy_pass http://host.docker.internal:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# API — api.fitcloud.local (REST + Socket.IO upgrade)
server {
    listen 80;
    server_name api.fitcloud.local;
    location / {
        proxy_pass http://host.docker.internal:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        # WebSocket upgrade (Socket.IO)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 75s;
    }
}

# Tenant portals — {slug}.fitcloud.local (wildcard MUST be last)
server {
    listen 80;
    server_name ~^(?<tenant>[a-z0-9-]+)\.fitcloud\.local$;
    location / {
        proxy_pass http://host.docker.internal:3001;
        proxy_set_header Host $host;               # Next.js middleware reads the slug from Host
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
