# ══════════════════════════════════════════════════════════════════════
# PRODUCTION reverse proxy skeleton. TLS terminates at Cloudflare edge;
# origin runs Cloudflare origin certificates. Same host-based routing as
# dev.conf but targeting compose/ECS service names. Rate limiting here is
# a coarse outer layer — the fine-grained limiter lives in the API (Redis).
# ══════════════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=api_ip:10m rate=30r/s;

upstream api_upstream        { server api:4000; }
upstream landing_upstream    { server landing-web:3000; }
upstream tenant_upstream     { server tenant-web:3000; }
upstream admin_upstream      { server super-admin:3000; }

server {
    listen 443 ssl;
    http2 on;
    server_name fitcloud.com www.fitcloud.com;
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    location / { proxy_pass http://landing_upstream; include /etc/nginx/proxy_params; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name admin.fitcloud.com;
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    location / { proxy_pass http://admin_upstream; include /etc/nginx/proxy_params; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.fitcloud.com;
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    location / {
        limit_req zone=api_ip burst=60 nodelay;
        proxy_pass http://api_upstream;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 75s;
    }
}

# Wildcard tenant portals — must be the last server block
server {
    listen 443 ssl;
    http2 on;
    server_name ~^(?<tenant>[a-z0-9-]+)\.fitcloud\.com$;
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    location / { proxy_pass http://tenant_upstream; include /etc/nginx/proxy_params; }
}

# Redirect all HTTP → HTTPS (edge normally handles this; belt & braces)
server {
    listen 80 default_server;
    return 301 https://$host$request_uri;
}
