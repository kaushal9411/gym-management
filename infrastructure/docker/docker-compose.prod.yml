# ══════════════════════════════════════════════════════════════════════
# PRODUCTION-shape compose — used for single-host deployments and as a
# reference for the ECS task definitions in infrastructure/terraform.
# PostgreSQL & Redis are MANAGED services in production (RDS/ElastiCache);
# they are intentionally absent here. Images come from the registry,
# tagged by git SHA — never built on the host, never `latest`.
# ══════════════════════════════════════════════════════════════════════

name: gym-saas-prod

services:
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - tenant-web
      - landing-web
      - super-admin

  api:
    image: ${REGISTRY}/gym-saas-api:${TAG}
    restart: always
    env_file: .env.production   # injected from secrets manager at deploy time
    expose: ["4000"]
    deploy:
      replicas: 2

  landing-web:
    image: ${REGISTRY}/gym-saas-landing-web:${TAG}
    restart: always
    env_file: .env.production
    expose: ["3000"]

  tenant-web:
    image: ${REGISTRY}/gym-saas-tenant-web:${TAG}
    restart: always
    env_file: .env.production
    expose: ["3000"]
    deploy:
      replicas: 2

  super-admin:
    image: ${REGISTRY}/gym-saas-super-admin:${TAG}
    restart: always
    env_file: .env.production
    expose: ["3000"]

volumes:
  certs:
