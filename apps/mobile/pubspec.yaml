name: gym_saas_mobile
description: FitCloud mobile app — one Flutter binary serves every tenant (slug/QR onboarding).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # State management (BLoC pattern — presentation layer)
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  # Networking (data layer)
  dio: ^5.7.0
  # Storage
  flutter_secure_storage: ^9.2.2
  # DI
  get_it: ^8.0.0
  # Navigation
  go_router: ^14.3.0
  # Realtime & push
  socket_io_client: ^2.0.3+1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  # Localization
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  # assets:, fonts: — added when the theme/branding feature lands
